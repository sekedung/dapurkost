<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Admin - DapurKost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

:root{
    --cream:#FEF9E1;
    --beige:#E5D0AC;
    --red:#A31D1D;
    --darkred:#6D2323;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg,var(--darkred),var(--red));
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:'Segoe UI',sans-serif;
}

.register-card{
    width:100%;
    max-width:420px;
    background:#fff;
    border-radius:24px;
    padding:30px;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.logo{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:30%;
    background:linear-gradient(135deg,var(--red),var(--darkred));
    display:flex;
    justify-content:center;
    align-items:center;
    color:#fff;
    font-size:28px;
    margin-bottom:15px;
}

.admin-badge{
    display:inline-block;
    padding:8px 16px;
    border-radius:50px;
    background:#fff3cd;
    color:#856404;
    font-size:13px;
    margin-bottom:20px;
}

.title{
    color:var(--darkred);
    font-weight:700;
    font-size:24px;

}

.subtitle{
    color:#777;
    margin-bottom:22px;
    font-size:14px;
}

.form-control{
    height:46px;
    border-radius:14px;
}

.input-group-text{
    border-radius:15px 0 0 15px;
}

.btn-register{
    height:55px;
    border:none;
    border-radius:15px;
    background:var(--red);
    color:white;
    font-weight:600;
    transition:.3s;
}

.btn-register:hover{
    background:var(--darkred);
}

.login-link{
    text-decoration:none;
    color:var(--red);
    font-weight:600;
}

.login-link:hover{
    color:var(--darkred);
}

</style>

</head>
<body>

<div class="register-card">

<div class="text-center">

<div class="logo">
<i class="bi bi-person-plus-fill"></i>
</div>

<div class="admin-badge">
Admin Registration
</div>

<h2 class="title">Register Admin</h2>

<p class="subtitle">
Daftarkan akun admin baru untuk mengelola DapurKost
</p>

</div>

<form id="registerForm">

<div class="mb-3">
<label class="form-label">Nama Admin</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

<input
type="text"
class="form-control"
id="nama"
placeholder="Masukkan nama admin"
required>

</div>
</div>

<div class="mb-3">
<label class="form-label">Email Admin</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input
type="email"
class="form-control"
id="email"
placeholder="admin@dapurkost.com"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input
type="password"
class="form-control"
id="password"
placeholder="Masukkan password"
required>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword('password','eye1')">

<i id="eye1" class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="mb-3">

<label class="form-label">Konfirmasi Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-shield-lock"></i>
</span>

<input
type="password"
class="form-control"
id="confirmPassword"
placeholder="Ulangi password"
required>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword('confirmPassword','eye2')">

<i id="eye2" class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="d-grid mt-4">

<button class="btn-register">

<i class="bi bi-person-check-fill"></i>

Daftar Admin

</button>

</div>

</form>

<hr class="my-4">

<div class="text-center">

Sudah punya akun?

<a href="login-admin.html" class="login-link">
Login
</a>

</div>

<div class="text-center mt-3 text-muted">
<small>© 2026 DapurKost Admin Panel</small>
</div>

</div>

<script>

function togglePassword(inputId,iconId){

const input=document.getElementById(inputId);
const icon=document.getElementById(iconId);

if(input.type==="password"){
input.type="text";
icon.classList.replace("bi-eye","bi-eye-slash");
}else{
input.type="password";
icon.classList.replace("bi-eye-slash","bi-eye");
}

}

document.getElementById("registerForm").addEventListener("submit",function(e){

e.preventDefault();

const password=document.getElementById("password").value;
const confirm=document.getElementById("confirmPassword").value;

if(password!==confirm){

alert("Konfirmasi password tidak sama!");

return;

}

document.getElementById("registerForm").addEventListener("submit", function(e){

    e.preventDefault();

    alert("Registrasi berhasil!");

    window.location.href = "login-admin.html";

});

});

</script>

</body>
</html>
