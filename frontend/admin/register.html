<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Admin - DapurKost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/admin.css">
</head>
<body class="register-body">

<!-- TOAST NOTIFIKASI -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1080;">
  <div id="appToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="appToastBody">Berhasil.</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<div class="register-card">

<div class="text-center">

<div class="logo auth-logo">
<img src="../assets/images/logo.png" alt="Logo DapurKost" class="register-logo-img">
</div>

<div class="admin-badge">
Admin Registration
</div>

<h2 class="title">Register Admin</h2>

<p class="subtitle">
Daftarkan akun admin baru untuk mengelola DapurKost
</p>

</div>

<form id="registerForm">

<div class="mb-3">
<label class="form-label">Nama Admin</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-person"></i>
</span>

<input
type="text"
class="form-control"
id="nama"
placeholder="Masukkan nama admin"
required>

</div>
</div>

<div class="mb-3">
<label class="form-label">Email Admin</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-envelope"></i>
</span>

<input
type="email"
class="form-control"
id="email"
placeholder="admin@dapurkost.id"
required>

</div>

</div>

<div class="mb-3">

<label class="form-label">Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-lock"></i>
</span>

<input
type="password"
class="form-control"
id="password"
placeholder="Masukkan password"
required>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword('password','eye1')">

<i id="eye1" class="bi bi-eye"></i>

</button>

</div>

<div class="mt-2" id="passwordStrengthWrap" style="display:none;">
  <div style="height:6px; border-radius:20px; background:#f0e6e6; overflow:hidden;">
    <div id="passwordStrengthBar" style="height:100%; width:0%; border-radius:20px; transition:.25s;"></div>
  </div>
  <small id="passwordStrengthLabel" class="text-muted"></small>
</div>

</div>

<div class="mb-3">

<label class="form-label">Konfirmasi Password</label>

<div class="input-group">

<span class="input-group-text">
<i class="bi bi-shield-lock"></i>
</span>

<input
type="password"
class="form-control"
id="confirmPassword"
placeholder="Ulangi password"
required>

<button
class="btn btn-outline-secondary"
type="button"
onclick="togglePassword('confirmPassword','eye2')">

<i id="eye2" class="bi bi-eye"></i>

</button>

</div>

</div>

<div class="form-check mb-3">
  <input class="form-check-input" type="checkbox" id="securityCheck" required>
  <label class="form-check-label small text-muted" for="securityCheck">
    Saya memahami bahwa akun ini memiliki akses penuh ke sistem admin DapurKost
    dan akan menjaga kerahasiaan password ini.
  </label>
</div>

<div class="d-grid mt-4">

<button class="btn-register">

<i class="bi bi-person-check-fill"></i>

Daftar Admin

</button>

</div>

</form>

<hr class="my-4">

<div class="text-center">

Sudah punya akun?

<a href="login-admin.html" class="login-link">
Login
</a>

</div>

<div class="text-center mt-3 text-muted">
<small>© 2026 DapurKost Admin Panel</small>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/admin.js"></script>
<script src="../assets/js/register.js"></script>

</body>
</html>
