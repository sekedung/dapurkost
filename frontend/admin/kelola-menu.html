<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelola Menu | DapurKost</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>
:root{
  --cream:#FEF9E1;
  --white:#FFFFFF;
  --red:#A31D1D;
  --dark:#6D2323;
  --gold:#dfd8cb;
  --text:#2B2B2B;
  --gray:#777;
  --shadow: 0 10px 30px rgba(0,0,0,.08);
}
*{ margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
body{ background:var(--cream); color:var(--text); }

/* ========== SIDEBAR ========== */
.sidebar{
  position:fixed; top:0; left:0; width:230px; height:100vh;
  background:linear-gradient(180deg,var(--red),var(--dark));
  padding:18px 20px; color:white; display:flex; flex-direction:column;
}
.logo{ display:flex; align-items:center; gap:12px; margin-bottom:18px; }
.logo-icon{ width:48px; height:48px; border-radius:15px; background:rgba(255,255,255,.15);
  display:flex; justify-content:center; align-items:center; font-size:24px; }
.logo h3{ margin:0; font-size:20px; font-weight:700; }
.logo p{ margin:0; opacity:.8; font-size:13px; }
.sidebar-menu{ margin-top:0px; }
.sidebar-menu a{
  display:flex; align-items:center; gap:14px; text-decoration:none; color:white;
  padding:15px 18px; border-radius:14px; margin-bottom:8px; transition:.25s; font-weight:500;
}
.sidebar-menu a:hover{ background:rgba(255,255,255,.15); transform:translateX(5px); }
.sidebar-menu .active{ background:white; color:var(--red); font-weight:600; }
.sidebar-menu i{ font-size:16px; width:22px; }
.logout{ margin-top:auto; }
.logout a{
  display:flex; align-items:center; gap:12px; text-decoration:none; padding:15px 18px;
  border-radius:16px; background:rgba(255,255,255,.12); color:white; transition:.3s;
}
.logout a:hover{ background:white; color:var(--red); }

/* ========== CONTENT ========== */
.main{ margin-left:230px; padding:24px 28px; }

/* ========== TOPBAR ========== */
.topbar{ display:flex; justify-content:space-between; align-items:center; margin-bottom:35px; flex-wrap:wrap; gap:15px; }
.topbar h2{ font-weight:700; font-size:34px; color:var(--dark); margin-bottom:5px; }
.topbar p{ margin:0; font-size:16px; color:var(--gray); }
.admin-info{ display:flex; align-items:center; gap:15px; }
.notification{ position:relative; font-size:24px; cursor:pointer; }
.badge-notif{
  position:absolute; top:-6px; right:-6px; background:#dc3545; color:white; font-size:11px;
  width:18px; height:18px; border-radius:50%; display:flex; justify-content:center; align-items:center;
}
.avatar{
  width:42px; height:42px; border-radius:50%; background:var(--gold);
  display:flex; justify-content:center; align-items:center; font-size:24px;
}

/* ========== TOOLBAR ========== */
.toolbar-card{
  background:white; border-radius:18px; padding:18px 20px; box-shadow:var(--shadow);
  margin-bottom:25px; display:flex; flex-wrap:wrap; gap:15px; align-items:center; justify-content:space-between;
}
.filter-tabs{ display:flex; flex-wrap:wrap; gap:8px; }
.filter-tabs button{
  border:1px solid var(--red); background:white; color:var(--red);
  padding:8px 16px; border-radius:20px; font-size:14px; font-weight:500; transition:.2s;
}
.filter-tabs button.active, .filter-tabs button:hover{ background:var(--red); color:white; }
.search-box{ position:relative; min-width:220px; }
.search-box input{
  border-radius:20px; padding:8px 15px 8px 38px; border:1px solid #ddd; width:100%; font-size:14px;
}
.search-box i{ position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--gray); }

/* ========== MENU CARD ========== */
.menu-card{
  background:white; border-radius:18px; overflow:hidden; box-shadow:var(--shadow);
  transition:.25s; height:100%; display:flex; flex-direction:column;
}
.menu-card:hover{ transform:translateY(-4px); }
.menu-card img{ width:100%; height:150px; object-fit:cover; }
.menu-card .body{ padding:16px; display:flex; flex-direction:column; flex:1; }
.menu-card .cat-badge{
  align-self:flex-start; background:var(--gold); color:var(--dark); font-size:11px;
  font-weight:600; padding:4px 10px; border-radius:12px; margin-bottom:8px; text-transform:capitalize;
}
.menu-card h5{ font-size:16px; font-weight:600; margin-bottom:6px; }
.menu-card .desc{ font-size:13px; color:var(--gray); margin-bottom:10px; flex:1; }
.menu-card .price{ font-weight:700; color:var(--red); font-size:16px; margin-bottom:12px; }
.menu-card .actions{ display:flex; gap:8px; }
.menu-card .actions .btn{ flex:1; font-size:13px; border-radius:10px; padding:6px; }

.empty-state{ text-align:center; padding:60px 20px; color:var(--gray); }
.empty-state i{ font-size:50px; color:var(--gold); display:block; margin-bottom:15px; }

@media(max-width:992px){
  .sidebar{ width:90px; padding:18px; }
  .logo h3, .logo p, .sidebar-menu span, .logout span{ display:none; }
  .main{ margin-left:90px; }
}
</style>
</head>
<body>

<div class="sidebar">
  <div class="logo">
    <div class="logo-icon">🍱</div>
    <div>
      <h3>DapurKost</h3>
      <p>Admin Panel</p>
    </div>
  </div>

  <div class="sidebar-menu">
    <a href="dashboard-admin.html"><i class="bi bi-grid-fill"></i><span>Dashboard</span></a>
    <a href="#" class="active"><i class="bi bi-cup-hot"></i><span>Kelola Menu</span></a>
    <a href="kelola-paket.html"><i class="bi bi-box-seam"></i><span>Kelola Paket</span></a>
    <a href="pesanan-admin.html"><i class="bi bi-bag-check"></i><span>Pesanan</span></a>
    <a href="pelanggan-admin.html"><i class="bi bi-people-fill"></i><span>Pelanggan</span></a>
    <a href="pembayaran-admin.html"><i class="bi bi-credit-card-2-front"></i><span>Pembayaran</span></a>
    <a href="laporan.html"><i class="bi bi-bar-chart-line"></i><span>Laporan</span></a>
  </div>

  <div class="logout">
    <a href="login-admin.html"><i class="bi bi-box-arrow-right"></i><span>Logout</span></a>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <div>
      <h2>Kelola Menu 🍜</h2>
      <p>Atur daftar menu makanan &amp; minuman DapurKost.</p>
    </div>
    <div class="admin-info">
      <div class="notification">
        <i class="bi bi-bell"></i>
        <span class="badge-notif">3</span>
      </div>
      <div class="avatar">👨🏻‍🍳</div>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar-card">
    <div class="filter-tabs" id="filterTabs"></div>
    <div style="display:flex; gap:10px; align-items:center;">
      <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text" id="searchInput" placeholder="Cari menu...">
      </div>
      <button class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#menuModal" onclick="openAddModal()">
        <i class="bi bi-plus-circle me-1"></i> Tambah Menu
      </button>
    </div>
  </div>

  <!-- GRID MENU -->
  <div class="row g-4" id="menuGrid"></div>

</div>

<!-- MODAL TAMBAH / EDIT -->
<div class="modal fade" id="menuModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content" style="border-radius:18px;">
      <form id="menuForm">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Tambah Menu</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="menuId">

          <div class="mb-3">
            <label class="form-label">Nama Menu</label>
            <input type="text" class="form-control" id="menuName" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Kategori</label>
            <select class="form-select" id="menuCategory" required>
              <option value="sarapan">Sarapan</option>
              <option value="makan-siang">Makan Siang</option>
              <option value="makan-malam">Makan Malam</option>
              <option value="minuman">Minuman</option>
              <option value="snack">Snack</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">Deskripsi</label>
            <textarea class="form-control" id="menuDesc" rows="2" required></textarea>
          </div>

          <div class="mb-3">
            <label class="form-label">Harga (Rp)</label>
            <input type="number" class="form-control" id="menuPrice" required>
          </div>

          <div class="mb-3">
            <label class="form-label">URL Gambar</label>
            <input type="text" class="form-control" id="menuImg">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Batal</button>
          <button type="submit" class="btn btn-danger">Simpan</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ==================== DATA MENU ==================== */
let menuItems = [
  { id: 1,  name: "Nasi Uduk Komplit",        category: "sarapan",      desc: "Nasi uduk gurih dengan ayam suwir, telur, dan sambal kacang.", price: 12000,  img: "https://thumb.viva.id/vivapurwasuka/665x374/2025/01/30/679a9491b8f3d-nasi-uduk_purwasuka.jpg" },
  { id: 2,  name: "Bubur Ayam Spesial",       category: "sarapan",      desc: "Bubur lembut dengan suwiran ayam, cakwe, dan kerupuk.",         price: 10000, img: "https://asset.kompas.com/crops/Xd5p_ptNeya-LsNQ0CxWomaW0KI=/0x0:1000x667/1200x800/data/photo/2020/07/11/5f09e008e7fee.jpg" },
  { id: 3,  name: "Roti Bakar Coklat Keju",   category: "sarapan",      desc: "Roti bakar renyah isi coklat leleh dan keju parut melimpah.",   price: 8000,  img: "https://tse2.mm.bing.net/th/id/OIP.9zEoX0bYgJ2iOOy9AInoKgHaFU?r=0&pid=Api&P=0&h=180" },
  { id: 4,  name: "Nasi Goreng Spesial",      category: "makan-siang",  desc: "Nasi goreng bumbu rumahan dengan telur, ayam, dan acar segar.", price: 15000, img: "https://tse1.mm.bing.net/th/id/OIP.tIZlQzdzEnwjkP8FAeDJ-QHaE1?r=0&pid=Api&P=0&h=180" },
  { id: 5,  name: "Ayam Geprek Sambal Bawang",category: "makan-siang",  desc: "Ayam crispy digeprek dengan sambal bawang pedas nampol.",       price: 16000, img: "https://thumbs.dreamstime.com/b/ayam-geprek-indonesian-food-crispy-fried-chicken-hot-spicy-sambal-chili-sauce-currently-found-indonesia-215159626.jpg" },
  { id: 6,  name: "Nasi Padang Rendang",      category: "makan-siang",  desc: "Nasi hangat dengan rendang empuk dan sayur nangka.",            price: 18000, img: "https://tse4.mm.bing.net/th/id/OIP.EADz9vBbtZf0DNyXvYdPeQHaE8?r=0&pid=Api&P=0&h=180" },
  { id: 7,  name: "Mie Goreng Jawa",          category: "makan-siang",  desc: "Mie goreng khas Jawa dengan telur, kol, dan bakso iris.",       price: 14000, img: "https://tse4.mm.bing.net/th/id/OIP.CB8rXfkckwuZVVQm1spX-gHaEK?r=0&pid=Api&P=0&h=180" },
  { id: 8,  name: "Soto Ayam Kampung",        category: "makan-malam",  desc: "Kuah bening segar dengan ayam kampung dan koya gurih.",         price: 15000, img: "https://www.dapurkobe.co.id/wp-content/uploads/soto-ayam.jpg" },
  { id: 9,  name: "Nasi Bakar Ayam Suwir",    category: "makan-malam",  desc: "Nasi dibakar daun pisang, isi ayam suwir bumbu meresap.",       price: 17000, img: "https://img-global.cpcdn.com/recipes/8d586dec2273f9ac/1200x630cq70/photo.jpg" },
  { id: 10, name: "Sate Ayam Madura",         category: "makan-malam",  desc: "Sate ayam empuk dengan bumbu kacang khas Madura.",              price: 16000, img: "https://2.bp.blogspot.com/-Q417tM9i4sc/UeAjUYDVfPI/AAAAAAAAAWg/MCZp4ZxhXUI/s1600/sate+ayam+madura.jpeg" },
  { id: 11, name: "Es Teh Manis",             category: "minuman",      desc: "Teh manis dingin segar, pelepas dahaga sehari-hari.",           price: 4000,  img: "https://tse3.mm.bing.net/th/id/OIP.2f0ccJB5cfeLh3hCKGdBbQHaFE?r=0&pid=Api&P=0&h=180" },
  { id: 12, name: "Es Jeruk Peras",           category: "minuman",      desc: "Perasan jeruk segar asli tanpa pemanis buatan.",                price: 6000,  img: "https://img-global.cpcdn.com/recipes/07049e233488cb67/680x482cq70/es-jeruk-peras-foto-resep-utama.jpg" },
  { id: 13, name: "Kopi Susu Gula Aren",      category: "minuman",      desc: "Kopi susu creamy dengan manis alami gula aren.",                price: 8000,  img: "https://img.okezone.com/content/2019/10/11/298/2115704/tips-bikin-es-kopi-susu-gula-aren-ala-coffee-shop-C2nLIqHPDk.jpg" },
  { id: 14, name: "Risoles Mayo",             category: "snack",        desc: "Risoles isi sayur, sosis, dan mayo lumer di dalamnya.",         price: 5000,  img: "https://i.pinimg.com/originals/5f/31/a2/5f31a212ec9ec5aaa4746cf7de936a69.jpg" },
  { id: 15, name: "Pisang Goreng Crispy",     category: "snack",        desc: "Pisang goreng renyah di luar, lembut manis di dalam.",          price: 6000,  img: "https://fibercreme.com/wp-content/uploads/2025/06/Header-3.webp" },
  { id: 16, name: "Tahu Isi Sayur",           category: "snack",        desc: "Tahu goreng renyah berisi tumisan sayur gurih.",                price: 5000,  img: "https://img.herstory.co.id/articles/archive_20230309/resep-masakan-20230309-112018.jpg" }
];

const categoryLabel = {
  "sarapan": "Sarapan",
  "makan-siang": "Makan Siang",
  "makan-malam": "Makan Malam",
  "minuman": "Minuman",
  "snack": "Snack"
};

let activeCategory = "semua";
let searchQuery = "";

/* ==================== FORMAT RUPIAH ==================== */
function formatRupiah(num){
  return "Rp" + num.toLocaleString("id-ID");
}

/* ==================== RENDER FILTER TABS ==================== */
function renderTabs(){
  const tabs = document.getElementById("filterTabs");
  let html = `<button class="${activeCategory==='semua'?'active':''}" onclick="setCategory('semua')">Semua</button>`;
  for(const key in categoryLabel){
    html += `<button class="${activeCategory===key?'active':''}" onclick="setCategory('${key}')">${categoryLabel[key]}</button>`;
  }
  tabs.innerHTML = html;
}

function setCategory(cat){
  activeCategory = cat;
  renderTabs();
  renderGrid();
}

/* ==================== RENDER GRID MENU ==================== */
function renderGrid(){
  const grid = document.getElementById("menuGrid");

  let filtered = menuItems.filter(item => {
    const matchCategory = activeCategory === "semua" || item.category === activeCategory;
    const matchSearch = item.name.toLowerCase().includes(searchQuery.toLowerCase());
    return matchCategory && matchSearch;
  });

  if(filtered.length === 0){
    grid.innerHTML = `
      <div class="col-12">
        <div class="empty-state">
          <i class="bi bi-cup-hot"></i>
          <p>Menu tidak ditemukan.</p>
        </div>
      </div>`;
    return;
  }

  grid.innerHTML = filtered.map(item => `
    <div class="col-lg-3 col-md-6">
      <div class="menu-card">
        <img src="${item.img}" alt="${item.name}">
        <div class="body">
          <span class="cat-badge">${categoryLabel[item.category]}</span>
          <h5>${item.name}</h5>
          <p class="desc">${item.desc}</p>
          <div class="price">${formatRupiah(item.price)}</div>
          <div class="actions">
            <button class="btn btn-outline-dark" onclick="openEditModal(${item.id})">
              <i class="bi bi-pencil-square"></i> Edit
            </button>
            <button class="btn btn-outline-danger" onclick="deleteMenu(${item.id})">
              <i class="bi bi-trash"></i> Hapus
            </button>
          </div>
        </div>
      </div>
    </div>
  `).join("");
}

/* ==================== SEARCH ==================== */
document.getElementById("searchInput").addEventListener("input", function(e){
  searchQuery = e.target.value;
  renderGrid();
});

/* ==================== MODAL TAMBAH ==================== */
function openAddModal(){
  document.getElementById("modalTitle").textContent = "Tambah Menu";
  document.getElementById("menuForm").reset();
  document.getElementById("menuId").value = "";
}

/* ==================== MODAL EDIT ==================== */
function openEditModal(id){
  const item = menuItems.find(m => m.id === id);
  if(!item) return;

  document.getElementById("modalTitle").textContent = "Edit Menu";
  document.getElementById("menuId").value = item.id;
  document.getElementById("menuName").value = item.name;
  document.getElementById("menuCategory").value = item.category;
  document.getElementById("menuDesc").value = item.desc;
  document.getElementById("menuPrice").value = item.price;
  document.getElementById("menuImg").value = item.img;

  const modal = new bootstrap.Modal(document.getElementById("menuModal"));
  modal.show();
}

/* ==================== SIMPAN (TAMBAH / EDIT) ==================== */
document.getElementById("menuForm").addEventListener("submit", function(e){
  e.preventDefault();

  const id = document.getElementById("menuId").value;
  const name = document.getElementById("menuName").value;
  const category = document.getElementById("menuCategory").value;
  const desc = document.getElementById("menuDesc").value;
  const price = parseInt(document.getElementById("menuPrice").value);
  const img = document.getElementById("menuImg").value || "https://placehold.co/500x375/E5D0AC/6D2323?font=poppins&text=" + encodeURIComponent(name);

  if(id){
    // EDIT
    const item = menuItems.find(m => m.id == id);
    item.name = name;
    item.category = category;
    item.desc = desc;
    item.price = price;
    item.img = img;
  } else {
    // TAMBAH BARU
    const newId = menuItems.length ? Math.max(...menuItems.map(m => m.id)) + 1 : 1;
    menuItems.push({ id: newId, name, category, desc, price, img });
  }

  renderGrid();
  bootstrap.Modal.getInstance(document.getElementById("menuModal")).hide();
});

/* ==================== HAPUS MENU ==================== */
function deleteMenu(id){
  if(confirm("Yakin ingin menghapus menu ini?")){
    menuItems = menuItems.filter(m => m.id !== id);
    renderGrid();
  }
}

/* ==================== INIT ==================== */
renderTabs();
renderGrid();
</script>

</body>
</html>
