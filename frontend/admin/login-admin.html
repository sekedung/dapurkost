<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin - DapurKost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="../assets/css/admin.css">
</head>

<body class="login-body">

<!-- TOAST NOTIFIKASI -->
<div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1080;">
  <div id="appToast" class="toast align-items-center text-white bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="appToastBody">Berhasil.</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>

<div class="login-card">

    <div class="text-center">

        <div class="logo auth-logo">
            <img src="../assets/images/logo.png" alt="Logo DapurKost" class="login-logo-img">
        </div>

        <h1 style="color:var(--darkred); font-weight:700; font-size:1.6rem; margin-bottom:2px;">DapurKost</h1>
        <p class="text-muted" style="font-size:12.5px; margin-bottom:12px;">Catering harian untuk anak kost</p>

        <div class="admin-badge">
            Admin Area
        </div>

        <h2 class="title">Login Admin</h2>

        <p class="subtitle">
            Masuk untuk mengelola sistem DapurKost
        </p>

    </div>

    <!-- FORM LOGIN -->
    <form id="loginForm">

        <!-- EMAIL -->
        <div class="mb-2">

            <label class="form-label">Email Admin</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>

                <input type="email"
                       class="form-control"
                       id="email"
                       placeholder="admin@dapurkost.com"
                       required>

            </div>

        </div>

        <!-- PASSWORD -->
        <div class="mb-2">

            <label class="form-label">Password</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>

                <input type="password"
                       class="form-control"
                       id="password"
                       placeholder="Masukkan password"
                       required>

                <button class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword()">

                    <i class="bi bi-eye" id="eyeIcon"></i>

                </button>

            </div>

        </div>

<!-- Tombol Login -->
<div class="d-grid mt-3">

    <button class="btn-login" type="submit">
        <i class="bi bi-box-arrow-in-right"></i>
        Login Admin
    </button>

</div>

<!-- Divider -->
<div class="divider">
    <span>atau</span>
</div>

<!-- Login Google (Dummy) -->
<div class="d-grid">

    <button type="button" class="google-btn" id="googleLoginBtn">

        <i class="bi bi-google"></i>

        Masuk dengan Google

    </button>

</div>

<!-- Register -->
<div class="text-center mt-3">

    <small class="text-muted">

        Belum punya akun?

        <a href="register.html"
           class="register-link">

            Daftar

        </a>

    </small>

</div>
        
    </form>

    <div class="text-center mt-2">
        <small class="text-muted" style="font-size:11.5px;">
            Demo: admin@dapurkost.id / 123456
        </small>
    </div>

    <hr class="my-3">

    <div class="text-center text-muted">
        <small>© 2026 DapurKost Admin Panel</small>
    </div>

</div>

<!-- SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../assets/js/admin.js"></script>
<script src="../assets/js/login.js"></script>

</body>
</html>
