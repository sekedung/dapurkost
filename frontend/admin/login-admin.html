<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login Admin - DapurKost</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

:root{
    --cream:#FEF9E1;
    --beige:#E5D0AC;
    --red:#A31D1D;
    --darkred:#6D2323;
}

body{
    min-height:100vh;
    background:linear-gradient(135deg, var(--darkred), var(--red));
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    font-family:'Poppins',sans-serif;
}

.login-card{
    width:100%;
    max-width:400px;
    background:white;
    border-radius:24px;
    padding:28px;
    box-shadow:0 20px 50px rgba(0,0,0,.15);
}

.logo{
    width:60px;
    height:60px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg, var(--red), var(--darkred));
    color:white;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    margin-bottom:10px;
}

.title{
    color:var(--darkred);
    font-weight:700;
    font-size:1.3rem;
    margin-bottom:4px;
}

.subtitle{
    color:#8a5a5a;
    font-size:0.85rem;
}

.form-label{
    color:var(--darkred);
    font-weight:600;
    font-size:0.85rem;
}

.form-control{
    height:44px;
    border-radius:12px;
    color:var(--darkred);
    font-size:0.9rem;
}

.form-control::placeholder{
    color:#c99;
}

.input-group-text{
    border-radius:12px 0 0 12px;
    color:var(--red);
}

.btn-login{
    height:46px;
    border:none;
    border-radius:12px;
    background:var(--red);
    color:var(--cream);
    font-weight:600;
    transition:.3s;
}

.btn-login:hover{
    background:var(--darkred);
}

.admin-badge{
    display:inline-block;
    background:var(--beige);
    color:var(--darkred);
    padding:5px 12px;
    border-radius:50px;
    font-size:11px;
    margin-bottom:10px;
}

/* Divider */

.divider{

    display:flex;
    align-items:center;
    margin:20px 0;

}

.divider::before,
.divider::after{

    content:"";
    flex:1;
    height:1px;
    background:#ddd;

}

.divider span{

    padding:0 15px;
    color:#888;
    font-size:14px;

}

/* Google Button */

.google-btn{

    width:100%;
    height:46px;

    border:1px solid #ddd;

    border-radius:12px;

    background:#fff;

    color:#444;

    font-weight:600;

    transition:.3s;

}

.google-btn i{

    color:#DB4437;
    margin-right:8px;

}

.google-btn:hover{

    background:#f8f9fa;
    border-color:#ccc;

}

/* Register */

.register-link{

    color:#A31D1D;
    font-weight:600;
    text-decoration:none;

}

.register-link:hover{

    color:#6D2323;
    text-decoration:underline;

}

</style>
</head>

<body>

<div class="login-card">

    <div class="text-center">

        <div class="logo">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <div class="admin-badge">
            Admin Area
        </div>

        <h2 class="title">Login Admin</h2>

        <p class="subtitle">
            Masuk untuk mengelola sistem DapurKost
        </p>

    </div>

    <!-- FORM LOGIN -->
    <form id="loginForm">

        <!-- EMAIL -->
        <div class="mb-2">

            <label class="form-label">Email Admin</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-envelope"></i>
                </span>

                <input type="email"
                       class="form-control"
                       id="email"
                       placeholder="admin@dapurkost.com"
                       required>

            </div>

        </div>

        <!-- PASSWORD -->
        <div class="mb-2">

            <label class="form-label">Password</label>

            <div class="input-group">

                <span class="input-group-text">
                    <i class="bi bi-lock"></i>
                </span>

                <input type="password"
                       class="form-control"
                       id="password"
                       placeholder="Masukkan password"
                       required>

                <button class="btn btn-outline-secondary"
                        type="button"
                        onclick="togglePassword()">

                    <i class="bi bi-eye" id="eyeIcon"></i>

                </button>

            </div>

        </div>

<!-- Tombol Login -->
<div class="d-grid mt-3">

    <button class="btn-login" type="submit">
        <i class="bi bi-box-arrow-in-right"></i>
        Login Admin
    </button>

</div>

<!-- Divider -->
<div class="divider">
    <span>atau</span>
</div>

<!-- Login Google (Dummy) -->
<div class="d-grid">

    <button type="button" class="google-btn">

        <i class="bi bi-google"></i>

        Masuk dengan Google

    </button>

</div>

<!-- Register -->
<div class="text-center mt-3">

    <small class="text-muted">

        Belum punya akun?

        <a href="register.html"
           class="register-link">

            Daftar

        </a>

    </small>

</div>
        
    </form>

    <hr class="my-3">

    <div class="text-center text-muted">
        <small>© 2026 DapurKost Admin Panel</small>
    </div>

</div>

<!-- SCRIPT -->
<script>

// toggle show/hide password
function togglePassword(){

    const password = document.getElementById("password");
    const eyeIcon = document.getElementById("eyeIcon");

    if(password.type === "password"){
        password.type = "text";
        eyeIcon.classList.remove("bi-eye");
        eyeIcon.classList.add("bi-eye-slash");
    }else{
        password.type = "password";
        eyeIcon.classList.remove("bi-eye-slash");
        eyeIcon.classList.add("bi-eye");
    }

}

// LOGIN VALIDASI + REDIRECT
document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(email !== "" && password !== ""){

        window.location.href = "dashboard-admin.html";

    }else{

        alert("Email dan password harus diisi!");

    }

});

</script>

</body>
</html>
